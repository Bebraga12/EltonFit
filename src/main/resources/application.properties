spring.application.name=EltonFit

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Configuração base de banco
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/eltonfit}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
security.jwt.secret=${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvbkFuZFZhbGlkYXRpb24xMjM0NTY=}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Bootstrap do admin (primeira execução)
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:adm@email.com}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:admin123}
